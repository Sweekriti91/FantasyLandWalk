# Test workflow for FantasyLandWalk
# Runs unit tests on Ubuntu (no platform-specific dependencies needed)

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore tests/FantasyLandWalk.Tests/FantasyLandWalk.Tests.csproj

      - name: Run tests
        run: dotnet test tests/FantasyLandWalk.Tests/FantasyLandWalk.Tests.csproj --no-restore --verbosity normal
