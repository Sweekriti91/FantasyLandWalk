# Build workflow for FantasyLandWalk .NET MAUI app
# Builds for both Android and iOS targets on macOS

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore NuGet packages
        run: dotnet restore FantasyLandWalk.sln

      # Android build runs on any platform
      - name: Build for Android
        run: dotnet build src/FantasyLandWalk/FantasyLandWalk.csproj -f net10.0-android -c Release --no-restore

      # iOS build requires macOS runner
      - name: Build for iOS
        if: runner.os == 'macOS'
        run: dotnet build src/FantasyLandWalk/FantasyLandWalk.csproj -f net10.0-ios -c Release --no-restore
